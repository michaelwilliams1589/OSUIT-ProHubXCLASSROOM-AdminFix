name: Update Weather Data
on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"
permissions:
  contents: write
concurrency:
  group: prohub-weather-update
  cancel-in-progress: true
jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build weather-data.json
        shell: python
        run: |
          import json, time, urllib.request
          from datetime import datetime, timezone
          from pathlib import Path
          locations={
            "okmulgee, ok":{"name":"Okmulgee","state":"OK","lat":35.6234,"lon":-95.9606},
            "tulsa, ok":{"name":"Tulsa","state":"OK","lat":36.1540,"lon":-95.9928},
            "bixby, ok":{"name":"Bixby","state":"OK","lat":35.9420,"lon":-95.8833},
            "stillwater, ok":{"name":"Stillwater","state":"OK","lat":36.1156,"lon":-97.0584},
            "oklahoma city, ok":{"name":"Oklahoma City","state":"OK","lat":35.4676,"lon":-97.5164}
          }
          headers={"User-Agent":"ProHubWeather/10.0","Accept":"application/geo+json, application/json"}
          def get(url):
            req=urllib.request.Request(url,headers=headers)
            with urllib.request.urlopen(req,timeout=30) as r:return json.load(r)
          path=Path("weather-data.json")
          try: previous=json.loads(path.read_text()) if path.exists() else {}
          except Exception: previous={}
          now=datetime.now(timezone.utc).isoformat()
          out={"schemaVersion":2,"generatedAt":now,"lastAttemptAt":now,"status":"ok","locations":{}}
          failures=0
          for key,loc in locations.items():
            try:
              point=get(f"https://api.weather.gov/points/{loc['lat']:.4f},{loc['lon']:.4f}")["properties"]
              daily=get(point["forecast"])
              hourly=get(point["forecastHourly"])
              out["locations"][key]={"name":loc["name"],"state":loc["state"],"latitude":loc["lat"],"longitude":loc["lon"],"current":(hourly.get("properties",{}).get("periods",[]) or [None])[0],"periods":daily.get("properties",{}).get("periods",[])[:14],"updated":now,"stale":False}
            except Exception as e:
              failures+=1
              old=previous.get("locations",{}).get(key)
              if old and old.get("periods"):
                old["stale"]=True; old["lastError"]=str(e); old["lastAttemptAt"]=now
                out["locations"][key]=old
              else:
                out["locations"][key]={"name":loc["name"],"state":loc["state"],"current":None,"periods":[],"stale":True,"lastError":str(e),"lastAttemptAt":now}
            time.sleep(1)
          if failures==len(locations): out["status"]="error"
          elif failures: out["status"]="partial"
          path.write_text(json.dumps(out,indent=2))
      - name: Commit weather data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add weather-data.json
          if git diff --cached --quiet; then echo "No changes."; else git commit -m "Update Pro Hub weather data"; git push; fi
